<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>F1 Hub Baku</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --f1-red: #e10600;
            --dark-bg: #0b0b0b;
            --card-bg: #161616;
            --text-gray: #888;
        }

        body {
            background: var(--dark-bg);
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        /* Навигация */
        .tabs {
            display: flex;
            border-bottom: 2px solid #333;
            background: var(--dark-bg);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 15px 0;
            font-weight: 800;
            text-transform: uppercase;
            color: #555;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
        }
        .tab.active {
            color: var(--f1-red);
            border-bottom: 3px solid var(--f1-red);
            margin-bottom: -2px;
        }

        /* Контейнеры страниц */
        .page { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Шапка ГП */
        .gp-title { 
            font-size: 32px; 
            font-weight: 800; 
            margin: 10px 0 20px 0; 
            display: flex; 
            align-items: center; 
            gap: 12px;
        }

        /* Таймер обратного отсчета */
        .timer-container { position: relative; margin-bottom: 30px; }
        .timer { 
            font-family: 'Share Tech Mono', monospace; 
            font-size: 64px; 
            line-height: 1; 
            letter-spacing: -2px; 
        }
        .baku-time-label { 
            position: absolute; 
            right: 0; 
            bottom: -20px; 
            font-size: 14px; 
            color: #555; 
            font-weight: 800; 
        }
        .date-text { 
            font-size: 24px; 
            font-family: 'Share Tech Mono', monospace; 
            margin-top: 5px; 
        }

        .divider { height: 3px; background: var(--f1-red); margin: 30px 0; width: 100%; }

        /* Карточки данных */
        .card { 
            background: var(--card-bg); 
            border-radius: 16px; 
            padding: 20px; 
            margin-bottom: 20px; 
            border-left: 5px solid var(--f1-red); 
        }
        .card-title { font-weight: 800; font-size: 18px; margin: 0 0 15px 0; display: flex; align-items: center; gap: 8px; }
        
        .schedule-item { font-size: 18px; font-weight: 800; color: var(--text-gray); margin: 10px 0; }
        .schedule-item span { color: #fff; }

        /* Секция Трасса */
        .track-section { margin: 30px 0; }
        .track-map-container {
            width: 100%;
            background: #111;
            border-radius: 16px;
            margin: 15px 0;
            padding: 10px;
            box-sizing: border-box;
        }
        .track-map { 
            width: 100%; 
            height: auto; 
            filter: drop-shadow(0 0 10px rgba(225, 6, 0, 0.2)); 
        }
        .track-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
            margin-top: 20px; 
        }
        .stat-box { display: flex; flex-direction: column; }
        .stat-label { font-size: 11px; color: #666; font-weight: 800; text-transform: uppercase; margin-bottom: 4px; }
        .stat-value { font-size: 20px; font-weight: 900; }

        /* Шансы и Список Extra */
        .driver-row { 
            background: var(--card-bg); 
            border-radius: 8px; 
            padding: 15px; 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 10px; 
            font-weight: 800; 
        }
        .percent { color: #00ff00; }

        .list-item { 
            background: var(--card-bg); 
            margin-bottom: 10px; 
            padding: 18px; 
            border-radius: 12px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .list-item:active { background: #222; }
        .gp-status { font-weight: 800; font-size: 11px; padding: 4px 8px; border-radius: 4px; background: #222; color: var(--f1-red); }
        .gp-status.past { color: #555; }
    </style>
</head>
<body>

    <div class="tabs">
        <div id="tab-current" class="tab active" onclick="switchPage('current')">Current</div>
        <div id="tab-extra" class="tab" onclick="switchPage('extra')">Extra</div>
    </div>

    <div id="page-current" class="page active">
        <div class="gp-title" id="main-gp-name">GP LOADING...</div>
        
        <div class="timer-container">
            <div class="timer" id="countdown">00.00.00</div>
            <div class="baku-time-label">BAKU TIME</div>
            <div class="date-text" id="main-race-date">--.--</div>
        </div>

        <div class="divider"></div>

        <div class="card">
            <div class="card-title">📅 Расписание Квалификаций</div>
            <div class="schedule-item">Q1: <span id="q1-time">--.-- | --:--</span></div>
            <div class="schedule-item">Q2: <span id="q2-time">--.-- | --:--</span></div>
            <div class="schedule-item">Q3: <span id="q3-time">--.-- | --:--</span></div>
        </div>

        <div class="card">
            <div class="card-title">☁️ Прогноз Погоды:</div>
            <div id="weather-info" style="font-size: 20px; font-weight: 800;">Загрузка...</div>
            <div id="track-temp" style="font-size: 12px; color: #666; margin-top: 5px;">Температура трассы: --°C</div>
        </div>

        <div class="track-section">
            <div class="card-title">📍 Трасса</div>
            <div class="track-map-container">
                <img id="track-img" src="" class="track-map" alt="Track Map">
            </div>
            <div class="track-grid">
                <div class="stat-box"><span class="stat-label">Длина Трассы</span><span class="stat-value" id="t-len">-- km</span></div>
                <div class="stat-box"><span class="stat-label">Число Кругов</span><span class="stat-value" id="t-laps">--</span></div>
                <div class="stat-box"><span class="stat-label">Первый GP</span><span class="stat-value" id="t-first">----</span></div>
                <div class="stat-box"><span class="stat-label">Длина Заезда</span><span class="stat-value" id="t-dist">-- km</span></div>
            </div>
        </div>

        <div class="card-title" style="margin-left:5px;">📊 Шансы на победу:</div>
        <div id="chances-container"></div>
    </div>

    <div id="page-extra" class="page">
        <div style="color:var(--f1-red); font-weight:800; margin-bottom:20px; text-transform:uppercase; letter-spacing: 1px;">Все этапы сезона</div>
        <div id="full-calendar"></div>
    </div>

<script>
    // База данных по трассам (фото и ТТХ)
    const circuitData = {
        "suzuka": { len: "5.807 km", laps: "53", first: "1976", dist: "307.471 km", img: "Japan" },
        "albert_park": { len: "5.278 km", laps: "58", first: "1996", dist: "306.124 km", img: "Australia" },
        "baku": { len: "6.003 km", laps: "51", first: "2016", dist: "306.049 km", img: "Azerbaijan" },
        "bahrain": { len: "5.412 km", laps: "57", first: "2004", dist: "308.238 km", img: "Bahrain" },
        "jeddah": { len: "6.174 km", laps: "50", first: "2021", dist: "308.450 km", img: "Saudi_Arabia" },
        "shanghai": { len: "5.451 km", laps: "56", first: "2004", dist: "305.066 km", img: "China" },
        "miami": { len: "5.412 km", laps: "57", first: "2022", dist: "308.326 km", img: "Miami" },
        "monaco": { len: "3.337 km", laps: "78", first: "1950", dist: "260.286 km", img: "Monaco" },
        "catalunya": { len: "4.657 km", laps: "66", first: "1991", dist: "307.236 km", img: "Spain" },
        "red_bull_ring": { len: "4.318 km", laps: "71", first: "1970", dist: "306.452 km", img: "Austria" },
        "silverstone": { len: "5.891 km", laps: "52", first: "1950", dist: "306.198 km", img: "Great_Britain" },
        "hungaroring": { len: "4.381 km", laps: "70", first: "1986", dist: "306.630 km", img: "Hungary" },
        "spa": { len: "7.004 km", laps: "44", first: "1950", dist: "308.052 km", img: "Belgium" },
        "zandvoort": { len: "4.259 km", laps: "72", first: "1952", dist: "306.587 km", img: "Netherlands" },
        "monza": { len: "5.793 km", laps: "53", first: "1950", dist: "306.720 km", img: "Italy" },
        "marina_bay": { len: "4.940 km", laps: "62", first: "2008", dist: "306.143 km", img: "Singapore" },
        "americas": { len: "5.513 km", laps: "56", first: "2012", dist: "308.405 km", img: "USA" },
        "rodriguez": { len: "4.304 km", laps: "71", first: "1963", dist: "305.354 km", img: "Mexico" },
        "interlagos": { len: "4.309 km", laps: "71", first: "1973", dist: "305.879 km", img: "Brazil" },
        "vegas": { len: "6.201 km", laps: "50", first: "2023", dist: "309.958 km", img: "Las_Vegas" },
        "losail": { len: "5.419 km", laps: "57", first: "2021", dist: "308.611 km", img: "Qatar" },
        "yas_marina": { len: "5.281 km", laps: "58", first: "2009", dist: "306.183 km", img: "Abu_Dhabi" }
    };

    function switchPage(p) {
        document.querySelectorAll('.page, .tab').forEach(el => el.classList.remove('active'));
        document.getElementById('page-'+p).classList.add('active');
        document.getElementById('tab-'+p).classList.add('active');
        window.scrollTo(0,0);
    }

    const formatZero = (n) => String(n).padStart(2, '0');

    async function updateRaceUI(race) {
        // Название и дата
        document.getElementById('main-gp-name').innerText = `GP ${race.Circuit.Location.country.toUpperCase()}`;
        const rDate = new Date(`${race.date}T${race.time || '12:00:00Z'}`);
        document.getElementById('main-race-date').innerText = `${formatZero(rDate.getDate())}.${formatZero(rDate.getMonth()+1)}`;

        // Таймер (обнуляем старый при переключении)
        if(window.raceInterval) clearInterval(window.raceInterval);
        window.raceInterval = setInterval(() => {
            const diff = rDate - new Date();
            if(diff <= 0) { document.getElementById('countdown').innerText = "00.00.00"; return; }
            const h = Math.floor(diff/3600000);
            const m = Math.floor((diff%3600000)/60000);
            const s = Math.floor((diff%60000)/1000);
            document.getElementById('countdown').innerText = `${formatZero(h)}.${formatZero(m)}.${formatZero(s)}`;
        }, 1000);

        // Расписание квалификации
        const qStart = new Date(`${race.Qualifying?.date || race.date}T${race.Qualifying?.time || '10:00:00Z'}`);
        const fmtDate = (d) => `${formatZero(d.getDate())}.${formatZero(d.getMonth()+1)} | ${formatZero(d.getHours())}:${formatZero(d.getMinutes())}`;
        document.getElementById('q1-time').innerText = fmtDate(qStart);
        document.getElementById('q2-time').innerText = fmtDate(new Date(qStart.getTime() + 25*60000));
        document.getElementById('q3-time').innerText = fmtDate(new Date(qStart.getTime() + 48*60000));

        // Обновление данных трассы
        const cid = race.Circuit.circuitId;
        const info = circuitData[cid] || { len: "5.000 km", laps: "50", first: "----", dist: "305.000 km", img: "Generic" };
        document.getElementById('t-len').innerText = info.len;
        document.getElementById('t-laps').innerText = info.laps;
        document.getElementById('t-first').innerText = info.first;
        document.getElementById('t-dist').innerText = info.dist;
        
        // Ссылка на фото трассы с серверов F1
        document.getElementById('track-img').src = `https://media.formula1.com/image/upload/content/dam/fom-website/2018-redesign-assets/circuit-maps/16x9/${info.img}_Circuit.png`;

        // Погода в реальном времени
        try {
            const wRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${race.Circuit.Location.lat}&longitude=${race.Circuit.Location.long}&current_weather=true`);
            const wData = await wRes.json();
            const temp = Math.round(wData.current_weather.temperature);
            document.getElementById('weather-info').innerText = `Ясно : ${temp}°C`;
            document.getElementById('track-temp').innerText = `Температура трассы: ${temp + 7}°C`;
        } catch(e) { console.error("Weather load failed"); }

        switchPage('current');
    }

    async function initApp() {
        try {
            // Загрузка календаря
            const calRes = await fetch('https://api.jolpi.ca/ergast/f1/current.json');
            const calData = await calRes.json();
            const races = calData.MRData.RaceTable.Races;
            const today = new Date();
            
            let calendarHtml = '';
            races.forEach(r => {
                const isPast = new Date(r.date) < today;
                calendarHtml += `
                    <div class="list-item" onclick='updateRaceUI(${JSON.stringify(r)})'>
                        <div><b>${r.raceName}</b><br><small style="color:#555">${r.date}</small></div>
                        <div class="gp-status ${isPast ? 'past' : ''}">${isPast ? 'FINISHED' : 'UPCOMING'}</div>
                    </div>`;
            });
            document.getElementById('full-calendar').innerHTML = calendarHtml;

            // Определяем текущее ГП
            const nextRace = races.find(r => new Date(r.date) >= today) || races[races.length-1];
            updateRaceUI(nextRace);

            // Шансы на победу (Топ-3 зачета)
            const standRes = await fetch('https://api.jolpi.ca/ergast/f1/current/driverStandings.json');
            const standData = await standRes.json();
            const top3 = standData.MRData.StandingsTable.StandingsLists[0].DriverStandings.slice(0, 3);
            
            let chancesHtml = '';
            const percents = [48, 22, 12];
            top3.forEach((d, i) => {
                let displayName = `${d.Driver.givenName.charAt(0)}. ${d.Driver.familyName}`;
                // Исправление для Антонелли
                if(d.Driver.familyName === "Antonelli") displayName = "К. Антонелли";
                
                chancesHtml += `
                    <div class="driver-row">
                        <span>${displayName}</span>
                        <span class="percent">${percents[i]}%</span>
                    </div>`;
            });
            document.getElementById('chances-container').innerHTML = chancesHtml + `<div class="driver-row" style="justify-content:center;color:#444;font-size:12px">Остальные: 18%</div>`;

        } catch(e) { console.error("Init failed", e); }
    }

    initApp();
</script>
</body>
</html>
