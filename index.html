<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Racing Hub Multi</title>
    <style>
        /* ТВОЙ СТИЛЬ (Можешь потом менять как хочешь) */
        body { background: #0b0b0b; color: white; font-family: sans-serif; margin: 0; padding: 0; }
        
        /* Меню вкладок сверху */
        .tab-menu { display: flex; background: #1a1a1a; position: sticky; top: 0; z-index: 100; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; color: #888; font-weight: bold; cursor: pointer; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: #e10600; border-bottom: 2px solid #e10600; }

        .content { padding: 20px; }
        .tab-content { display: none; } /* По умолчанию прячем всё */
        .tab-content.active { display: block; } /* Показываем только активную */

        /* Карточки для красоты */
        .card { background: #1a1a1a; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 4px solid #444; }
        .f1-border { border-left-color: #e10600; }
        .wec-border { border-left-color: #00ff00; }
        .gt-border { border-left-color: #ffaa00; }
    </style>
</head>
<body>

    <div class="tab-menu">
        <button class="tab-btn active" onclick="openTab(event, 'f1')">F1</button>
        <button class="tab-btn" onclick="openTab(event, 'wec')">WEC</button>
        <button class="tab-btn" onclick="openTab(event, 'gt')">GT / Nurb</button>
    </div>

    <div class="content">
        <div id="f1" class="tab-content active">
            <h1>Formula 1</h1>
            <div class="card f1-border">
                <h3>GP Japan 🇯🇵</h3>
                <p>Квалификация: 4 апреля</p>
                <p>Гонка: 5 апреля</p>
            </div>
        </div>

        <div id="wec" class="tab-content">
            <h1>WEC / Le Mans</h1>
            <div class="card wec-border">
                <h3>6 Hours of Spa 🇧🇪</h3>
                <p>Дата: 10 мая</p>
                <p>Классы: Hypercar, LMGT3</p>
            </div>
        </div>

        <div id="gt" class="tab-content">
            <h1>GT World Challenge</h1>
            <div class="card gt-border">
                <h3>Nürburgring 24h 🇩🇪</h3>
                <p>Легендарная петля ждет.</p>
