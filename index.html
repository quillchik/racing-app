<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>F1 Current</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
body {
    background: #0b0b0b;
    color: #ffffff;
    font-family: 'Montserrat', sans-serif;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
}
.tabs {
    display: flex;
    border-bottom: 2px solid #333;
    background: #0b0b0b;
    position: sticky;
    top: 0;
    z-index: 100;
}
.tab {
    flex: 1;
    text-align: center;
    padding: 15px 0;
    font-weight: 800;
    text-transform: uppercase;
    color: #555;
    font-size: 16px;
}
.tab.active {
    color: #e10600;
    border-bottom: 3px solid #e10600;
    margin-bottom: -2px;
}
.container {
    padding: 20px;
}
.gp-title {
    font-size: 32px;
    font-weight: 800;
    margin: 10px 0 20px 0;
}
.timer-container {
    text-align: left;
    margin-bottom: 30px;
    position: relative;
}
.timer {
    font-family: 'Share Tech Mono', monospace;
    font-size: 64px;
    font-weight: 400;
    line-height: 1;
    margin: 0;
    letter-spacing: -2px;
}
.baku-time {
    position: absolute;
    right: 0;
    bottom: -20px;
    font-size: 14px;
    color: #555;
    font-weight: 800;
    text-transform: uppercase;
}
.date-text {
    font-size: 24px;
    font-family: 'Share Tech Mono', monospace;
    margin-top: 5px;
}
.divider {
    height: 3px;
    background: #e10600;
    margin: 30px 0;
    width: 100%;
}
.card {
    background: #161616;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
    border-left: 5px solid #e10600;
}
.card-title {
    font-weight: 800;
    font-size: 18px;
    margin: 0 0 15px 0;
}
.schedule-item {
    font-size: 20px;
    font-weight: 800;
    color: #888;
    margin: 10px 0;
}
.schedule-item span {
    color: #fff;
}
.weather-box {
    background: #222;
    border-radius: 8px;
    padding: 15px;
    font-size: 18px;
    font-weight: 800;
    margin-bottom: 10px;
}
.weather-sub {
    font-size: 12px;
    color: #888;
}
.driver-row {
    background: #161616;
    border-radius: 8px;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
    font-weight: 800;
}
.driver-row:last-child {
    background: #222;
    color: #888;
}
.percent {
    color: #00ff00;
}
</style>
</head>
<body>

<div class="tabs">
    <div class="tab active">Current</div>
    <div class="tab">Extra</div>
</div>

<div class="container">
    <div class="gp-title" id="gp-name">GP Загрузка...</div>
    
    <div class="timer-container">
        <div class="timer" id="countdown">00.00.00</div>
        <div class="baku-time">BAKU TIME</div>
        <div class="date-text" id="race-date">dd.mm</div>
    </div>

    <div class="divider"></div>

    <div class="card">
        <div class="card-title">📅 Расписание Квалификаций</div>
        <div class="schedule-item">Q1: <span id="q1-time">--.-- | --:--</span></div>
        <div class="schedule-item">Q2: <span id="q2-time">--.-- | --:--</span></div>
        <div class="schedule-item">Q3: <span id="q3-time">--.-- | --:--</span></div>
    </div>

    <div class="card">
        <div class="card-title">☁️ Прогноз Погоды:</div>
        <div class="weather-box" id="weather-info">WeatherInfo : --</div>
        <div class="weather-sub" id="track-temp">Температура трассы: --°C</div>
    </div>

    <div class="card-title" style="margin-left:5px;">📊 Шансы на победу:</div>
    <div id="chances-container">
        </div>
</div>

<script>
async function initApp() {
    try {
        const f1Res = await fetch('https://api.jolpi.ca/ergast/f1/current/next.json');
        const f1Data = await f1Res.json();
        const race = f1Data.MRData.RaceTable.Races[0];
        
        let flag = '🏁';
        if(race.Circuit.Location.country === 'Japan') flag = '🇯🇵';
        if(race.Circuit.Location.country === 'Azerbaijan') flag = '🇦🇿';
        if(race.Circuit.Location.country === 'USA') flag = '🇺🇸';
        
        document.getElementById('gp-name').innerHTML = `GP ${race.Circuit.Location.country} ${flag}`;
        
        const raceDateStr = `${race.date}T${race.time || '15:00:00Z'}`;
        const raceDateObj = new Date(raceDateStr);
        
        const formatZero = (num) => String(num).padStart(2, '0');
        document.getElementById('race-date').innerText = `${formatZero(raceDateObj.getDate())}.${formatZero(raceDateObj.getMonth() + 1)}`;
        
        setInterval(() => {
            const now = new Date().getTime();
            const distance = raceDateObj.getTime() - now;
            if (distance < 0) {
                document.getElementById('countdown').innerText = "00.00.00";
                return;
            }
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
            const totalHours = (days * 24) + hours;
            document.getElementById('countdown').innerText = `${formatZero(totalHours)}.${formatZero(minutes)}.${formatZero(seconds)}`;
        }, 1000);

        if (race.Qualifying) {
            const qDateStr = `${race.Qualifying.date}T${race.Qualifying.time || '15:00:00Z'}`;
            const qDate = new Date(qDateStr);
            
            // Настройка интервалов сессий
            const q2Date = new Date(qDate.getTime() + 25 * 60000); // Q2 начинается примерно через 25 мин
            const q3Date = new Date(qDate.getTime() + 45 * 60000); // Q3 начинается примерно через 45 мин

            const formatTime = (d) => {
                const dd = formatZero(d.getDate());
                const mm = formatZero(d.getMonth() + 1);
                const hh = formatZero(d.getHours());
                const min = formatZero(d.getMinutes());
                return `${dd}.${mm} | ${hh}:${min}`;
            };

            document.getElementById('q1-time').innerText = formatTime(qDate);
            document.getElementById('q2-time').innerText = formatTime(q2Date);
            document.getElementById('q3-time').innerText = formatTime(q3Date);
        }

        // Погода
        const lat = race.Circuit.Location.lat;
        const lng = race.Circuit.Location.long;
        const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current_weather=true`);
        const weatherData = await weatherRes.json();
        
        const temp = Math.round(weatherData.current_weather.temperature);
        const code = weatherData.current_weather.weathercode;
        let condition = "Ясно";
        if (code > 0 && code <= 3) condition = "Облачно";
        if (code >= 50 && code <= 69) condition = "Дождь";
        if (code >= 95) condition = "Гроза";

        document.getElementById('weather-info').innerText = `${condition} : ${temp}°C`;
        document.getElementById('track-temp').innerText = `Температура трассы: ${temp + 5}°C`;

        // Гонщики с форматом И. Фамилия
        const standRes = await fetch('https://api.jolpi.ca/ergast/f1/current/driverStandings.json');
        const standData = await standRes.json();
        const topDrivers = standData.MRData.StandingsTable.StandingsLists[0].DriverStandings.slice(0, 3);
        
        let chancesHtml = '';
        let totalTopChances = 0;
        const baseChances = [45, 25, 15];

        topDrivers.forEach((d, index) => {
            const chance = baseChances[index];
            totalTopChances += chance;
            // Форматирование: Первая буква имени + Фамилия
            const initial = d.Driver.givenName.charAt(0);
            const fullName = `${initial}. ${d.Driver.familyName}`;
            
            chancesHtml += `<div class="driver-row"><span>${fullName}</span><span class="percent">${chance}%</span></div>`;
        });
        
        chancesHtml += `<div class="driver-row" style="justify-content: center;"><span>Другие (${100 - totalTopChances}%)</span></div>`;
        document.getElementById('chances-container').innerHTML = chancesHtml;

    } catch (e) {
        console.error("Ошибка загрузки данных:", e);
    }
}
initApp();
</script>
</body>
</html>
