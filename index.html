<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>F1 Hub Baku</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --f1-red: #e10600;
            --dark-bg: #0b0b0b;
            --card-bg: #161616;
            --text-gray: #888;
        }

        body {
            background: var(--dark-bg);
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        /* Навигация */
        .tabs {
            display: flex;
            border-bottom: 2px solid #333;
            background: var(--dark-bg);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 15px 0;
            font-weight: 800;
            text-transform: uppercase;
            color: #555;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        .tab.active {
            color: var(--f1-red);
            border-bottom: 3px solid var(--f1-red);
            margin-bottom: -2px;
        }

        /* Контейнеры страниц */
        .page { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Заголовок ГП */
        .gp-title { 
            font-size: 32px; 
            font-weight: 800; 
            margin: 10px 0 20px 0; 
            display: flex; 
            align-items: center; 
            gap: 12px;
        }

        /* Таймер */
        .timer-container { position: relative; margin-bottom: 30px; }
        .timer { 
            font-family: 'Share Tech Mono', monospace; 
            font-size: 64px; 
            line-height: 1; 
            letter-spacing: -2px; 
        }
        .baku-time { 
            position: absolute; 
            right: 0; 
            bottom: -20px; 
            font-size: 14px; 
            color: #555; 
            font-weight: 800; 
        }
        .date-text { 
            font-size: 24px; 
            font-family: 'Share Tech Mono', monospace; 
            margin-top: 5px; 
        }

        .divider { height: 3px; background: var(--f1-red); margin: 30px 0; width: 100%; }

        /* Карточки */
        .card { 
            background: var(--card-bg); 
            border-radius: 16px; 
            padding: 20px; 
            margin-bottom: 20px; 
            border-left: 5px solid var(--f1-red); 
        }
        .card-title { font-weight: 800; font-size: 18px; margin: 0 0 15px 0; display: flex; align-items: center; gap: 8px; }
        
        .schedule-item { font-size: 20px; font-weight: 800; color: var(--text-gray); margin: 10px 0; }
        .schedule-item span { color: #fff; }

        /* Секция Трасса */
        .track-section { margin: 30px 0; }
        .track-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 25px; 
            margin-top: 20px; 
        }
        .stat-box { display: flex; flex-direction: column; }
        .stat-label { font-size: 11px; color: #666; font-weight: 800; text-transform: uppercase; margin-bottom: 4px; }
        .stat-value { font-size: 22px; font-weight: 900; }

        /* Шансы на победу */
        .driver-row { 
            background: var(--card-bg); 
            border-radius: 8px; 
            padding: 15px; 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 10px; 
            font-weight: 800; 
        }
        .percent { color: #00ff00; }

        /* Список Extra */
        .list-item { 
            background: var(--card-bg); 
            margin-bottom: 10px; 
            padding: 18px; 
            border-radius: 12px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .list-item:active { background: #222; }
        .gp-status { font-weight: 800; font-size: 11px; padding: 4px 8px; border-radius: 4px; background: #222; color: var(--f1-red); }
        .gp-status.past { color: #555; }
    </style>
</head>
<body>

    <div class="tabs">
        <div id="tab-current" class="tab active" onclick="switchPage('current')">Current</div>
        <div id="tab-extra" class="tab" onclick="switchPage('extra')">Extra</div>
    </div>

    <div id="page-current" class="page active">
        <div class="gp-title" id="main-gp-name">GP LOADING...</div>
        
        <div class="timer-container">
            <div class="timer" id="countdown">00.00.00</div>
            <div class="baku-time">BAKU TIME</div>
            <div class="date-text" id="main-race-date">--.--</div>
        </div>

        <div class="divider"></div>

        <div class="card">
            <div class="card-title">📅 Расписание Квалификаций</div>
            <div class="schedule-item">Q1: <span id="q1-time">--.-- | --:--</span></div>
            <div class="schedule-item">Q2: <span id="q2-time">--.-- | --:--</span></div>
            <div class="schedule-item">Q3: <span id="q3-time">--.-- | --:--</span></div>
        </div>

        <div class="card">
            <div class="card-title">☁️ Прогноз Погоды:</div>
            <div id="weather-info" style="font-size: 20px; font-weight: 800;">Загрузка...</div>
            <div id="track-temp" style="font-size: 12px; color: #666; margin-top: 5px;">Температура трассы: --°C</div>
        </div>

        <div class="track-section">
            <div class="card-title">📍 Трасса</div>
            <div class="track-grid">
                <div class="stat-box"><span class="stat-label">Длина Трассы</span><span class="stat-value" id="t-len">-- km</span></div>
                <div class="stat-box"><span class="stat-label">Число Кругов</span><span class="stat-value" id="t-laps">--</span></div>
                <div class="stat-box"><span class="stat-label">Первый GP</span><span class="stat-value" id="t-first">----</span></div>
                <div class="stat-box"><span class="stat-label">Длина Заезда</span><span class="stat-value" id="t-dist">-- km</span></div>
            </div>
        </div>

        <div class="card-title" style="margin-left:5px;">📊 Шансы на победу:</div>
        <div id="chances-container"></div>
    </div>

    <div id="page-extra" class="page">
        <div style="color:var(--f1-red); font-weight:800; margin-bottom:20px; text-transform:uppercase;">Календарь сезона</div>
        <div id="full-calendar"></div>
    </div>

<script>
    // База данных трасс
    const circuitData = {
        "suzuka": { len: "5.807 km", laps: "53", first: "1976", dist: "307.471 km" },
        "albert_park": { len: "5.278 km", laps: "58", first: "1996", dist: "306.124 km" },
        "baku": { len: "6.003 km", laps: "51", first: "2016", dist: "306.049 km" },
        "bahrain": { len: "5.412 km", laps: "57", first: "2004", dist: "308.238 km" },
        "jeddah": { len: "6.174 km", laps: "50", first: "2021", dist: "308.450 km" },
        "shanghai": { len: "5.451 km", laps: "56", first: "2004", dist: "305.066 km" },
        "miami": { len: "5.412 km", laps: "57", first: "2022", dist: "308.326 km" }
    };

    function switchPage(p) {
        document.querySelectorAll('.page, .tab').forEach(el => el.classList.remove('active'));
        document.getElementById('page-'+p).classList.add('active');
        document.getElementById('tab-'+p).classList.add('active');
        window.scrollTo(0,0);
    }

    const formatZero = (n) => String(n).padStart(2, '0');

    async function updateRaceUI(race) {
        // Заголовок и дата
        document.getElementById('main-gp-name').innerText = `GP ${race.Circuit.Location.country}`;
        const rDate = new Date(`${race.date}T${race.time || '12:00:00Z'}`);
        document.getElementById('main-race-date').innerText = `${formatZero(rDate.getDate())}.${formatZero(rDate.getMonth()+1)}`;

        // Таймер
        if(window.raceInterval) clearInterval(window.raceInterval);
        window.raceInterval = setInterval(() => {
            const diff = rDate - new Date();
            if(diff <= 0) { document.getElementById('countdown').innerText = "00.00.00"; return; }
            const h = Math.floor(diff/3600000);
            const m = Math.floor((diff%3600000)/60000);
            const s = Math.floor((diff%60000)/1000);
            document.getElementById('countdown').innerText = `${formatZero(h)}.${formatZero(m)}.${formatZero(s)}`;
        }, 1000);

        // Квалификация (расчет сессий)
        const qStart = new Date(`${race.Qualifying?.date || race.date}T${race.Qualifying?.time || '10:00:00Z'}`);
        const fmt = (d) => `${formatZero(d.getDate())}.${formatZero(d.getMonth()+1)} | ${formatZero(d.getHours())}:${formatZero(d.getMinutes())}`;
        document.getElementById('q1-time').innerText = fmt(qStart);
        document.getElementById('q2-time').innerText = fmt(new Date(qStart.getTime() + 25*60000));
        document.getElementById('q3-time').innerText = fmt(new Date(qStart.getTime() + 48*60000));

        // Трасса
        const cid = race.Circuit.circuitId;
        const info = circuitData[cid] || { len: "5.000 km", laps: "50", first: "----", dist: "305.000 km" };
        document.getElementById('t-len').innerText = info.len;
        document.getElementById('t-laps').innerText = info.laps;
        document.getElementById('t-first').innerText = info.first;
        document.getElementById('t-dist').innerText = info.dist;

        // Погода
        try {
            const wRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${race.Circuit.Location.lat}&longitude=${race.Circuit.Location.long}&current_weather=true`);
            const wData = await wRes.json();
            const temp = Math.round(wData.current_weather.temperature);
            document.getElementById('weather-info').innerText = `Ясно : ${temp}°C`;
            document.getElementById('track-temp').innerText = `Температура трассы: ${temp + 7}°C`;
        } catch(e) { console.error("Weather error"); }

        switchPage('current');
    }

    async function initApp() {
        try {
            // Календарь
            const calRes = await fetch('https://api.jolpi.ca/ergast/f1/current.json');
            const calData = await calRes.json();
            const races = calData.MRData.RaceTable.Races;
            const today = new Date();
            
            let html = '';
            races.forEach(r => {
                const isPast = new Date(r.date) < today;
                html += `
                    <div class="list-item" onclick='updateRaceUI(${JSON.stringify(r)})'>
                        <div><b>${r.raceName}</b><br><small style="color:#555">${r.date}</small></div>
                        <div class="gp-status ${isPast ? 'past' : ''}">${isPast ? 'FINISHED' : 'UPCOMING'}</div>
                    </div>`;
            });
            document.getElementById('full-calendar').innerHTML = html;

            // Загружаем текущую/следующую гонку
            const nextRace = races.find(r => new Date(r.date) >= today) || races[races.length-1];
            updateRaceUI(nextRace);

            // Шансы (Гонщики)
            const standRes = await fetch('https://api.jolpi.ca/ergast/f1/current/driverStandings.json');
            const standData = await standRes.json();
            const top3 = standData.MRData.StandingsTable.StandingsLists[0].DriverStandings.slice(0, 3);
            
            let chHtml = '';
            const percents = [48, 22, 12];
            top3.forEach((d, i) => {
                let name = `${d.Driver.givenName.charAt(0)}. ${d.Driver.familyName}`;
                // Фикс для Антонелли
                if(d.Driver.familyName === "Antonelli") name = "K. Antonelli";
                
                chHtml += `<div class="driver-row"><span>${name}</span><span class="percent">${percents[i]}%</span></div>`;
            });
            document.getElementById('chances-container').innerHTML = chHtml + `<div class="driver-row" style="justify-content:center;color:#444">Другие</div>`;

        } catch(e) { console.error("App init error", e); }
    }

    initApp();
</script>
</body>
</html>
